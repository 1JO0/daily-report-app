<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一条塾 活動報告ジェネレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 【修正箇所1】 Babelのバージョンを安定版(7.23.6)に固定 -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        /* Hide scrollbar for emoji picker but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Animation for Edit Mode */
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .animate-pulse-border {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300">
    <div id="root"></div>

    <!-- 【修正箇所2】 data-type="module" を追加してモジュールエラーを回避 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- Icons (SVG Components) ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            Zap: (props) => <Icon {...props} path={<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></>} />,
            Moon: (props) => <Icon {...props} path={<><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></>} />,
            Sun: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></>} />,
            GripVertical: (props) => <Icon {...props} path={<><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></>} />,
            Trash2: (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></>} />,
            Plus: (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>} />,
            Save: (props) => <Icon {...props} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></>} />,
            RotateCcw: (props) => <Icon {...props} path={<><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></>} />,
            MonitorPlay: (props) => <Icon {...props} path={<><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><polygon points="10 8 16 11 10 14 10 8"></polygon></>} />,
            Calendar: (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></>} />,
            Copy: (props) => <Icon {...props} path={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></>} />,
            Check: (props) => <Icon {...props} path={<><polyline points="20 6 9 17 4 12"></polyline></>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>} />,
            Settings: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>} />,
            Download: (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></>} />,
            Upload: (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></>} />,
            ArrowLeft: (props) => <Icon {...props} path={<><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></>} />,
            ArrowRight: (props) => <Icon {...props} path={<><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></>} />,
            ArrowLeftRight: (props) => <Icon {...props} path={<><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></>} />,
            Edit3: (props) => <Icon {...props} path={<><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></>} />,
            Bold: (props) => <Icon {...props} path={<><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></>} />,
        };

        // --- Constants & Types ---
        const DEFAULT_TEMPLATES = [
            { id: 't1', title: '読書', emoji: '📘', defaultDetails: "書名『』 P〜Pまで\n気付きメモ:" },
            { id: 't2', title: '筋トレ', emoji: '💪', defaultDetails: "懸垂 10回×3セット\nディップス 10回×3セット" },
            { id: 't3', title: '講座受講', emoji: '💻', defaultDetails: "セクションXX\nセクションXX" },
            { id: 't4', title: 'お散歩', emoji: '🚶', defaultDetails: "30分 リフレッシュ" }
        ];

        const DEFAULT_EMOJIS = ['⚡️', '📘', '💪', '💻', '🚶', '🎨', '🗣️', '📝', '🥗', '💤', '✅', '🔥', '✨', '🚀', '💡', '🎵', '🏃', '🏋️', '🧘', '🍳'];

        // --- Sub Components ---
        
        // Custom Emoji Picker Component
        const EmojiPicker = ({ emoji, onEmojiChange, isOpen, onToggle, onClose, isDarkMode, customEmojis = DEFAULT_EMOJIS }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        onClose();
                    }
                };
                if (isOpen) document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [isOpen, onClose]);

            return (
                <div className="relative" ref={wrapperRef}>
                    <button onClick={onToggle} className={`text-2xl w-10 h-10 flex items-center justify-center rounded hover:bg-black/5 transition-colors ${isOpen ? 'bg-black/5 dark:bg-white/10' : ''}`} title="絵文字を変更">
                        {emoji || '⚡️'}
                    </button>
                    {isOpen && (
                        <div className={`absolute top-full left-0 mt-2 z-50 w-64 p-3 rounded-xl shadow-xl border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-xs font-bold opacity-70">絵文字を選択または入力</span>
                                <button onClick={onClose} className="p-1 hover:bg-black/10 rounded-full"><Icons.X size={14}/></button>
                            </div>
                            <div className={`flex items-center gap-2 mb-3 p-2 rounded border ${isDarkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-300'}`}>
                                <input type="text" value={emoji} onChange={(e) => onEmojiChange(e.target.value)} className="bg-transparent w-full text-center font-bold focus:outline-none" placeholder="自由入力" />
                            </div>
                            <div className="grid grid-cols-6 gap-1 max-h-40 overflow-y-auto no-scrollbar">
                                {customEmojis.map((e, index) => (
                                    <button key={`${e}-${index}`} onClick={() => { onEmojiChange(e); onClose(); }} className={`p-1.5 rounded text-lg hover:scale-110 transition-transform ${emoji === e ? 'bg-blue-100 dark:bg-blue-900' : 'hover:bg-black/5 dark:hover:bg-white/10'}`}>
                                        {e}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Main Application Component ---
        function App() {
            // State
            const [activities, setActivities] = useState([]);
            const [templates, setTemplates] = useState(DEFAULT_TEMPLATES);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [copied, setCopied] = useState(false);
            
            // Emoji Customization State
            const [customEmojis, setCustomEmojis] = useState(DEFAULT_EMOJIS);
            const [emojiInputText, setEmojiInputText] = useState(DEFAULT_EMOJIS.join(''));
            
            // New Template Form
            const [showTemplateForm, setShowTemplateForm] = useState(false);
            const [newTemplateTitle, setNewTemplateTitle] = useState('');
            const [newTemplateEmoji, setNewTemplateEmoji] = useState('⚡️');
            
            // Reorder & Edit Mode
            const [isReorderMode, setIsReorderMode] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            
            // Drag & Drop State
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            
            // Editing State
            const [editingTemplate, setEditingTemplate] = useState(null);

            // Settings Modal
            const [showSettings, setShowSettings] = useState(false);
            const fileInputRef = useRef(null);

            // UI State
            const [activeEmojiPicker, setActiveEmojiPicker] = useState(null); 
            
            // Date State
            const [reportDate, setReportDate] = useState(() => {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            });

            // Effects (LocalStorage)
            useEffect(() => {
                const savedActivities = localStorage.getItem('ichijo_activities');
                const savedTemplates = localStorage.getItem('ichijo_templates');
                const savedEmojis = localStorage.getItem('ichijo_emojis');

                if (savedActivities) setActivities(JSON.parse(savedActivities));
                if (savedTemplates) setTemplates(JSON.parse(savedTemplates));
                if (savedEmojis) {
                    try {
                        const parsed = JSON.parse(savedEmojis);
                        setCustomEmojis(parsed);
                        setEmojiInputText(parsed.join(''));
                    } catch(e) { console.error(e) }
                }
                
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDarkMode(true);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('ichijo_activities', JSON.stringify(activities));
            }, [activities]);

            useEffect(() => {
                localStorage.setItem('ichijo_templates', JSON.stringify(templates));
            }, [templates]);

            useEffect(() => {
                localStorage.setItem('ichijo_emojis', JSON.stringify(customEmojis));
            }, [customEmojis]);

            useEffect(() => {
                if (isDarkMode) {
                    document.body.classList.add('bg-slate-900', 'text-slate-100');
                    document.body.classList.remove('bg-slate-50', 'text-slate-800');
                } else {
                    document.body.classList.add('bg-slate-50', 'text-slate-800');
                    document.body.classList.remove('bg-slate-900', 'text-slate-100');
                }
            }, [isDarkMode]);

            // --- Actions ---

            const addActivity = (template) => {
                if (isReorderMode || isEditMode) return; 
                const newActivity = {
                    id: crypto.randomUUID(),
                    title: template ? template.title : '',
                    emoji: template ? template.emoji : '⚡️',
                    details: template ? template.defaultDetails : ''
                };
                setActivities([...activities, newActivity]);
            };

            const updateActivity = (id, field, value) => {
                setActivities(activities.map(act => act.id === id ? { ...act, [field]: value } : act));
            };

            const removeActivity = (id) => {
                setActivities(activities.filter(act => act.id !== id));
            };

            const clearAll = () => setActivities([]);

            const saveAsTemplate = (activity) => {
                const newTemplate = {
                    id: crypto.randomUUID(),
                    title: activity.title,
                    emoji: activity.emoji,
                    defaultDetails: activity.details
                };
                setTemplates([...templates, newTemplate]);
            };

            const deleteTemplate = (id) => {
                setTemplates(templates.filter(t => t.id !== id));
            };

            const createCustomTemplate = () => {
                if (!newTemplateTitle) return;
                const newTemplate = {
                    id: crypto.randomUUID(),
                    title: newTemplateTitle,
                    emoji: newTemplateEmoji,
                    defaultDetails: ''
                };
                setTemplates([...templates, newTemplate]);
                setNewTemplateTitle('');
                setNewTemplateEmoji('⚡️');
                setShowTemplateForm(false);
            };

            // Emoji Customization Logic
            const handleEmojiInputChange = (e) => {
                const val = e.target.value;
                setEmojiInputText(val);
                
                try {
                    // 複雑な絵文字（肌の色など）を正しく分割する
                    const segmenter = new Intl.Segmenter('ja', { granularity: 'grapheme' });
                    const newEmojis = Array.from(segmenter.segment(val))
                        .map(s => s.segment)
                        .filter(s => s.trim() !== '' && s !== ','); // 空白とカンマを除外
                    // 重複を削除
                    const uniqueEmojis = [...new Set(newEmojis)];
                    setCustomEmojis(uniqueEmojis.length > 0 ? uniqueEmojis : DEFAULT_EMOJIS);
                } catch(err) {
                    // Fallback
                    const newEmojis = [...val].filter(s => s.trim() !== '' && s !== ',');
                    const uniqueEmojis = [...new Set(newEmojis)];
                    setCustomEmojis(uniqueEmojis.length > 0 ? uniqueEmojis : DEFAULT_EMOJIS);
                }
            };

            // Bold Tag Insertion
            const insertBoldTag = (id) => {
                const textarea = document.getElementById(`details-${id}`);
                if (!textarea) return;

                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                
                const before = text.substring(0, start);
                const selected = text.substring(start, end);
                const after = text.substring(end);
                
                // If selected text is already bolded (surrounded by **), remove them
                // This is a simple check, could be improved
                if (before.endsWith('**') && after.startsWith('**')) {
                    const newText = before.slice(0, -2) + selected + after.slice(2);
                    updateActivity(id, 'details', newText);
                    setTimeout(() => {
                        textarea.focus();
                        textarea.setSelectionRange(start - 2, start - 2 + selected.length);
                    }, 0);
                } else {
                    const newText = before + `**${selected}**` + after;
                    updateActivity(id, 'details', newText);
                    setTimeout(() => {
                        textarea.focus();
                        if (selected.length === 0) {
                            textarea.setSelectionRange(start + 2, start + 2);
                        } else {
                            textarea.setSelectionRange(start + 2 + selected.length + 2, start + 2 + selected.length + 2);
                        }
                    }, 0);
                }
            };

            // Template Editing Logic
            const handleTemplateClick = (template) => {
                if (isEditMode) {
                    setEditingTemplate({...template});
                } else if (!isReorderMode) {
                    addActivity(template);
                }
            };

            const saveTemplateChanges = () => {
                if (!editingTemplate || !editingTemplate.title) return;
                setTemplates(templates.map(t => t.id === editingTemplate.id ? editingTemplate : t));
                setEditingTemplate(null);
                setIsEditMode(false);
            };

            // Reorder Logic (Drag and Drop)
            const handleDragStart = (e, index) => {
                setDraggedIndex(index);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', index); // 一部ブラウザ用のおまじない
            };

            const handleDragEnter = (e, index) => {
                e.preventDefault();
                setDragOverIndex(index);
            };

            const handleDragOver = (e) => {
                e.preventDefault(); // ドロップを許可する
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                if (draggedIndex === null || draggedIndex === dropIndex) {
                    setDraggedIndex(null);
                    setDragOverIndex(null);
                    return;
                }
                
                const newTemplates = [...templates];
                const draggedItem = newTemplates.splice(draggedIndex, 1)[0];
                newTemplates.splice(dropIndex, 0, draggedItem);
                
                setTemplates(newTemplates);
                setDraggedIndex(null);
                setDragOverIndex(null);
            };

            const handleDragEnd = () => {
                setDraggedIndex(null);
                setDragOverIndex(null);
            };

            // Backup & Restore Logic
            const handleExportSettings = () => {
                const data = {
                    templates: templates,
                    activities: activities, // Optional: saving current draft as well
                    emojis: customEmojis,
                    version: 1,
                    exportedAt: new Date().toISOString()
                };
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `ichijo-report-backup-${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportSettings = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.templates) setTemplates(data.templates);
                        if (data.activities) setActivities(data.activities); // Restore draft if present
                        if (data.emojis) {
                            setCustomEmojis(data.emojis);
                            setEmojiInputText(data.emojis.join(''));
                        }
                        alert('設定を復元しました！');
                        setShowSettings(false);
                    } catch (err) {
                        alert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; // Reset input
            };

            // Generate Markdown
            const generateMarkdown = () => {
                const [y, m, d] = reportDate.split('-').map(Number);
                const dateObj = new Date(y, m - 1, d);
                const days = ['日', '月', '火', '水', '木', '金', '土'];
                const dayOfWeek = days[dateObj.getDay()];
                
                const headerSection = `# 活動報告\n**${y}/${m}/${d}（${dayOfWeek}）**\n\n`;
                if (activities.length === 0) return `${headerSection}（活動内容がまだありません）`;

                const bodySection = activities.map(act => {
                    const header = `## ${act.emoji} ${act.title}`;
                    const body = act.details
                        .split('\n')
                        .map(line => line.trim())
                        .filter(line => line !== '')
                        .map(line => `　└${line}`)
                        .join('\n');
                    return body ? `${header}\n${body}` : header;
                }).join('\n');

                return headerSection + bodySection;
            };

            const handleCopy = () => {
                const text = generateMarkdown();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    });
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            // UI Components
            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    {/* Header */}
                    <div className="max-w-5xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center gap-2">
                                <Icons.Zap className="text-yellow-500 fill-yellow-500" />
                                活動報告ジェネレーター
                            </h1>
                            <p className={`text-sm mt-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                今日の成果を最速でDiscordへ。
                            </p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className={`p-2 rounded-full ${isDarkMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white hover:bg-slate-200'} shadow-sm transition-all`} title="設定・バックアップ">
                                <Icons.Settings size={20} />
                            </button>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2 rounded-full ${isDarkMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white hover:bg-slate-200'} shadow-sm transition-all`}>
                                {isDarkMode ? <Icons.Sun size={20} /> : <Icons.Moon size={20} />}
                            </button>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* LEFT COLUMN */}
                        <div className="lg:col-span-7 flex flex-col gap-6">
                            
                            {/* Templates */}
                            <div className={`p-4 rounded-xl shadow-sm border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-3">
                                        <h2 className="font-bold flex items-center gap-2 text-sm uppercase tracking-wider opacity-70">
                                            <Icons.GripVertical size={16} /> クイック追加
                                        </h2>
                                        
                                        {/* Toggle Buttons */}
                                        <div className="flex bg-slate-200 dark:bg-slate-700 rounded p-0.5">
                                            <button 
                                                onClick={() => { setIsReorderMode(!isReorderMode); setIsEditMode(false); }}
                                                className={`text-xs px-2 py-1 rounded transition-colors ${isReorderMode ? 'bg-white text-blue-600 shadow-sm font-bold' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'}`}
                                            >
                                                並び替え
                                            </button>
                                            <div className="w-px bg-slate-300 dark:bg-slate-600 my-1 mx-0.5"></div>
                                            <button 
                                                onClick={() => { setIsEditMode(!isEditMode); setIsReorderMode(false); }}
                                                className={`text-xs px-2 py-1 rounded transition-colors ${isEditMode ? 'bg-white text-green-600 shadow-sm font-bold' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'}`}
                                            >
                                                編集
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {!isEditMode && !isReorderMode && (
                                        <button onClick={() => setShowTemplateForm(!showTemplateForm)} className="text-xs text-blue-500 hover:text-blue-400 font-medium">
                                            {showTemplateForm ? '閉じる' : '+ カスタム登録'}
                                        </button>
                                    )}
                                </div>
                                
                                {isEditMode && (
                                    <div className="mb-4 text-xs text-center text-green-600 dark:text-green-400 font-bold animate-pulse">
                                        編集したい項目をタップしてください
                                    </div>
                                )}

                                {showTemplateForm && (
                                    <div className={`mb-4 p-3 rounded-lg border ${isDarkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>
                                        <div className="flex gap-2 items-center">
                                            <EmojiPicker 
                                                emoji={newTemplateEmoji} 
                                                onEmojiChange={setNewTemplateEmoji}
                                                isOpen={activeEmojiPicker === 'new-template'}
                                                onToggle={() => setActiveEmojiPicker(activeEmojiPicker === 'new-template' ? null : 'new-template')}
                                                onClose={() => setActiveEmojiPicker(null)}
                                                isDarkMode={isDarkMode}
                                                customEmojis={customEmojis}
                                            />
                                            <input type="text" placeholder="タイトル" className={`flex-1 p-2 rounded text-sm border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-300'}`} value={newTemplateTitle} onChange={(e) => setNewTemplateTitle(e.target.value)} />
                                            <button onClick={createCustomTemplate} disabled={!newTemplateTitle} className="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 text-sm">追加</button>
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-wrap gap-2">
                                    {templates.map((t, idx) => (
                                        <div 
                                            key={t.id} 
                                            className={`group relative transition-all duration-200 ${isReorderMode ? 'cursor-grab active:cursor-grabbing' : ''}`}
                                            draggable={isReorderMode}
                                            onDragStart={isReorderMode ? (e) => handleDragStart(e, idx) : undefined}
                                            onDragEnter={isReorderMode ? (e) => handleDragEnter(e, idx) : undefined}
                                            onDragOver={isReorderMode ? handleDragOver : undefined}
                                            onDrop={isReorderMode ? (e) => handleDrop(e, idx) : undefined}
                                            onDragEnd={isReorderMode ? handleDragEnd : undefined}
                                        >
                                            <button 
                                                onClick={() => handleTemplateClick(t)}
                                                disabled={isReorderMode}
                                                className={`flex items-center gap-2 px-4 py-2 rounded-lg border transition-all text-left 
                                                    ${isReorderMode ? 'pointer-events-none select-none' : 'active:scale-95'}
                                                    ${draggedIndex === idx ? 'opacity-20 scale-95' : ''}
                                                    ${isEditMode ? 'border-green-400 ring-2 ring-green-100 dark:ring-green-900 cursor-pointer animate-pulse-border' : ''}
                                                    ${isDarkMode ? 'bg-slate-700 border-slate-600 hover:bg-slate-600' : 'bg-slate-50 border-slate-200 hover:bg-blue-50 hover:border-blue-200'}
                                                `}
                                            >
                                                <span className="text-xl">{t.emoji}</span>
                                                <span className="font-medium text-sm">{t.title}</span>
                                                {isEditMode && <Icons.Edit3 size={12} className="ml-1 text-green-500" />}
                                            </button>
                                            
                                            {/* Delete Button (Normal Mode) */}
                                            {!isReorderMode && !isEditMode && (
                                                <button onClick={(e) => { e.stopPropagation(); deleteTemplate(t.id); }} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm z-10">
                                                    <Icons.Trash2 size={10} />
                                                </button>
                                            )}

                                            {/* Reorder Mode Visual Overlay */}
                                            {isReorderMode && draggedIndex !== idx && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-black/5 dark:bg-white/5 rounded-lg pointer-events-none">
                                                    <Icons.GripVertical size={18} className="text-slate-500 dark:text-slate-400 opacity-50" />
                                                </div>
                                            )}

                                            {/* Insertion Indicator (Vertical Dashed Line) */}
                                            {isReorderMode && dragOverIndex === idx && draggedIndex !== idx && (
                                                <div className={`absolute top-0 bottom-0 w-0 border-l-2 border-dashed border-blue-500 z-20 ${draggedIndex < idx ? '-right-[5px]' : '-left-[5px]'}`}>
                                                    <div className="absolute -top-1 -left-[3px] w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                                                    <div className="absolute -bottom-1 -left-[3px] w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    
                                    {!isReorderMode && !isEditMode && (
                                        <button onClick={() => addActivity()} className={`flex items-center gap-2 px-4 py-2 rounded-lg border border-dashed transition-all ${isDarkMode ? 'border-slate-600 hover:bg-slate-800 text-slate-400' : 'border-slate-300 hover:bg-slate-100 text-slate-500'}`}>
                                            <Icons.Plus size={16} />
                                            <span className="text-sm">空の項目</span>
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Activities */}
                            <div className="space-y-4">
                                <div className="flex justify-between items-end">
                                    <h2 className="font-bold text-lg">今日の積み上げ</h2>
                                    {activities.length > 0 && (
                                        <button onClick={clearAll} className="text-xs text-red-500 hover:text-red-600 flex items-center gap-1">
                                            <Icons.RotateCcw size={12} /> リセット
                                        </button>
                                    )}
                                </div>

                                {activities.length === 0 ? (
                                    <div className={`text-center py-12 rounded-xl border border-dashed ${isDarkMode ? 'border-slate-700 text-slate-500' : 'border-slate-300 text-slate-400'}`}>
                                        <p>上のボタンから活動を追加してください</p>
                                    </div>
                                ) : (
                                    activities.map(act => (
                                        <div key={act.id} className={`p-4 rounded-xl shadow-sm border transition-all ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                            <div className="flex items-center gap-3 mb-3">
                                                <EmojiPicker 
                                                    emoji={act.emoji} 
                                                    onEmojiChange={(val) => updateActivity(act.id, 'emoji', val)}
                                                    isOpen={activeEmojiPicker === act.id}
                                                    onToggle={() => setActiveEmojiPicker(activeEmojiPicker === act.id ? null : act.id)}
                                                    onClose={() => setActiveEmojiPicker(null)}
                                                    isDarkMode={isDarkMode}
                                                    customEmojis={customEmojis}
                                                />
                                                <input type="text" value={act.title} onChange={(e) => updateActivity(act.id, 'title', e.target.value)} placeholder="活動タイトル" className={`flex-1 text-lg font-bold bg-transparent border-b focus:outline-none focus:border-blue-500 transition-colors ${isDarkMode ? 'border-slate-700' : 'border-slate-300'}`} />
                                                <div className="flex items-center gap-1">
                                                    <button onClick={() => saveAsTemplate(act)} className="p-2 rounded hover:bg-blue-100 dark:hover:bg-slate-700 text-blue-500 transition-colors" title="テンプレートとして保存">
                                                        <Icons.Save size={16} />
                                                    </button>
                                                    <button onClick={() => removeActivity(act.id)} className="p-2 rounded hover:bg-red-100 dark:hover:bg-slate-700 text-red-500 transition-colors" title="削除">
                                                        <Icons.Trash2 size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="pl-2 border-l-2 border-slate-200 dark:border-slate-600 ml-3">
                                                <div className="flex justify-end mb-1">
                                                     <button onClick={() => insertBoldTag(act.id)} className={`text-xs flex items-center gap-1 px-2 py-1 rounded hover:opacity-80 ${isDarkMode ? 'bg-slate-700' : 'bg-slate-200'}`} title="選択範囲を太字にする">
                                                        <Icons.Bold size={14} /> 太字
                                                     </button>
                                                </div>
                                                <textarea 
                                                    id={`details-${act.id}`}
                                                    value={act.details} 
                                                    onChange={(e) => updateActivity(act.id, 'details', e.target.value)} 
                                                    placeholder="詳細を入力（改行で区切ると自動で └ が付きます）" 
                                                    rows={act.details ? act.details.split('\n').length + 1 : 2} 
                                                    className={`w-full text-sm bg-transparent resize-y focus:outline-none p-2 rounded ${isDarkMode ? 'text-slate-300 placeholder-slate-600' : 'text-slate-600 placeholder-slate-400'}`} 
                                                />
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* RIGHT COLUMN */}
                        <div className="lg:col-span-5">
                            <div className={`sticky top-6 rounded-xl shadow-lg overflow-hidden border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                <div className={`p-4 border-b flex flex-col gap-3 ${isDarkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-100 border-slate-200'}`}>
                                    <div className="flex justify-between items-center">
                                        <h3 className="font-bold flex items-center gap-2">
                                            <Icons.MonitorPlay size={18} />
                                            Discord プレビュー
                                        </h3>
                                        <div className={`flex items-center gap-2 px-2 py-1 rounded border ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-slate-300'}`}>
                                            <Icons.Calendar size={14} className="opacity-70" />
                                            <input type="date" value={reportDate} onChange={(e) => setReportDate(e.target.value)} className="bg-transparent text-xs font-mono focus:outline-none cursor-pointer" />
                                        </div>
                                    </div>
                                    <button onClick={handleCopy} disabled={activities.length === 0} className={`w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-bold transition-all transform active:scale-95 ${copied ? 'bg-green-500 text-white shadow-green-500/50' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-blue-600/30'} shadow-lg disabled:opacity-50 disabled:cursor-not-allowed`}>
                                        {copied ? <Icons.Check size={18} /> : <Icons.Copy size={18} />}
                                        {copied ? 'コピー完了！' : 'Discord用にコピー'}
                                    </button>
                                </div>
                                <div className={`p-6 min-h-[300px] font-mono text-sm leading-relaxed overflow-x-auto whitespace-pre-wrap ${isDarkMode ? 'bg-[#313338] text-slate-200' : 'bg-[#f2f3f5] text-[#2b2d31]'}`}>
                                    {generateMarkdown()}
                                </div>
                                <div className={`p-3 text-xs text-center border-t ${isDarkMode ? 'border-slate-700 text-slate-500' : 'border-slate-200 text-slate-400'}`}>
                                    「# 活動報告」や日付は自動で付きます
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Template Editing Modal */}
                    {editingTemplate && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" onClick={() => setEditingTemplate(null)}>
                            <div className={`w-full max-w-sm p-5 rounded-xl shadow-2xl ${isDarkMode ? 'bg-slate-800 text-slate-100' : 'bg-white text-slate-800'}`} onClick={e => e.stopPropagation()}>
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <Icons.Edit3 size={18} /> 項目を編集
                                </h3>
                                
                                <div className="space-y-4">
                                    <div className="flex gap-2">
                                        <div className="flex-shrink-0">
                                            <label className="text-xs font-bold block mb-1 opacity-70">アイコン</label>
                                            <EmojiPicker 
                                                emoji={editingTemplate.emoji} 
                                                onEmojiChange={(val) => setEditingTemplate({...editingTemplate, emoji: val})}
                                                isOpen={activeEmojiPicker === 'edit-template'}
                                                onToggle={() => setActiveEmojiPicker(activeEmojiPicker === 'edit-template' ? null : 'edit-template')}
                                                onClose={() => setActiveEmojiPicker(null)}
                                                isDarkMode={isDarkMode}
                                                customEmojis={customEmojis}
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-bold block mb-1 opacity-70">タイトル</label>
                                            <input 
                                                type="text" 
                                                value={editingTemplate.title} 
                                                onChange={(e) => setEditingTemplate({...editingTemplate, title: e.target.value})}
                                                className={`w-full p-2.5 rounded border text-sm font-bold ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-slate-50 border-slate-300'}`}
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold block mb-1 opacity-70">デフォルトの本文（定型文）</label>
                                        <textarea 
                                            value={editingTemplate.defaultDetails || ''} 
                                            onChange={(e) => setEditingTemplate({...editingTemplate, defaultDetails: e.target.value})}
                                            rows={4}
                                            placeholder="ボタンを押した時に最初から入れておきたい内容をここに書けます。"
                                            className={`w-full p-3 rounded border text-sm ${isDarkMode ? 'bg-slate-700 border-slate-600 placeholder-slate-500' : 'bg-slate-50 border-slate-300 placeholder-slate-400'}`}
                                        />
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button 
                                            onClick={() => setEditingTemplate(null)}
                                            className={`flex-1 py-2 rounded text-sm font-bold ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-slate-200 hover:bg-slate-300'}`}
                                        >
                                            キャンセル
                                        </button>
                                        <button 
                                            onClick={saveTemplateChanges}
                                            className="flex-1 py-2 rounded bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold"
                                        >
                                            保存する
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" onClick={() => setShowSettings(false)}>
                            <div className={`w-full max-w-md p-6 rounded-xl shadow-2xl ${isDarkMode ? 'bg-slate-800 text-slate-100' : 'bg-white text-slate-800'}`} onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <Icons.Settings size={20} /> 設定・データ管理
                                    </h3>
                                    <button onClick={() => setShowSettings(false)} className="p-1 hover:bg-black/10 rounded-full"><Icons.X size={20}/></button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <h4 className="font-bold text-sm mb-2 opacity-80">絵文字パレットのカスタマイズ</h4>
                                        <p className="text-xs mb-3 opacity-60">絵文字を連続で入力すると、パレットの候補が自動で更新されます。</p>
                                        <textarea
                                            value={emojiInputText}
                                            onChange={handleEmojiInputChange}
                                            rows={3}
                                            className={`w-full p-2 rounded border text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-slate-50 border-slate-300'}`}
                                            placeholder="絵文字を入力（例：⚡️📘💪💻）"
                                        />
                                    </div>

                                    <div className={`h-px w-full ${isDarkMode ? 'bg-slate-700' : 'bg-slate-200'}`}></div>

                                    <div>
                                        <h4 className="font-bold text-sm mb-2 opacity-80">設定の保存（バックアップ）</h4>
                                        <p className="text-xs mb-3 opacity-60">現在のテンプレートと入力内容をファイルとして保存します。</p>
                                        <button onClick={handleExportSettings} className="w-full flex items-center justify-center gap-2 p-3 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                                            <Icons.Download size={18} /> 設定をファイルに書き出す
                                        </button>
                                    </div>

                                    <div className={`h-px w-full ${isDarkMode ? 'bg-slate-700' : 'bg-slate-200'}`}></div>

                                    <div>
                                        <h4 className="font-bold text-sm mb-2 opacity-80">設定の復元（読み込み）</h4>
                                        <p className="text-xs mb-3 opacity-60">保存したバックアップファイル（.json）を読み込みます。</p>
                                        <label className={`w-full flex items-center justify-center gap-2 p-3 rounded-lg border-2 border-dashed cursor-pointer hover:opacity-70 transition-opacity ${isDarkMode ? 'border-slate-600 bg-slate-700/50' : 'border-slate-300 bg-slate-50'}`}>
                                            <Icons.Upload size={18} />
                                            <span>ファイルをを選択して復元</span>
                                            <input 
                                                type="file" 
                                                accept=".json" 
                                                className="hidden" 
                                                ref={fileInputRef}
                                                onChange={handleImportSettings}
                                            />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
